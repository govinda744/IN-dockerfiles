nameOverride: ""
fullnameOverride: ""

app:
  image:
    repository: invoiceninja/invoiceninja-debian
    tag: latest
    pullPolicy: IfNotPresent
  # Tag for the busybox init container that waits for MySQL/Redis.
  busyboxTag: "1.36"
  # NOTE: replicaCount > 1 requires ReadWriteMany storage for appPublic and
  # appStorage. The default ReadWriteOnce PVCs can only bind to one node.
  replicaCount: 1
  resources: {}
  # NOTE: you can set these if needed. You might need to tweak the values below
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  #   limits:
  #     memory: 512Mi
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

nginx:
  image:
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  resources: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      add:
        - CHOWN
      drop:
        - ALL
  initSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

mysql:
  image:
    repository: mysql
    tag: "8"
    pullPolicy: IfNotPresent
  service:
    port: 3306
  resources: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    # MySQL's initialization scripts require privilege escalation; this cannot
    # be set to false without a custom entrypoint.
    allowPrivilegeEscalation: true
    capabilities:
      drop:
        - NET_RAW
  nodeSelector: {}
  affinity: {}
  tolerations: []

redis:
  image:
    repository: redis
    tag: alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

persistence:
  appPublic:
    enabled: false
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ""
  appStorage:
    enabled: false
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClassName: ""
  mysqlData:
    enabled: false
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClassName: ""
  redisData:
    enabled: false
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ""

serviceAccount:
  create: false
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: invoiceninja.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

secret:
  # REQUIRED: generate with `php artisan key:generate --show` or
  # openssl rand -base64 32 | sed 's/^/base64:/'
  appKey: ""
  dbPassword: ninja
  dbRootPassword: ninjaAdm1nPassword
  redisPassword: ""
  inUserEmail: admin@example.com
  inPassword: changeme!

env:
  # REQUIRED: set to the URL users will access the app on, e.g. https://invoices.example.com
  appUrl: http://localhost
  appEnv: production
  appDebug: "false"
  requireHttps: "false"
  phantomjsPdfGeneration: "false"
  pdfGenerator: snappdf
  # trustedProxies: restrict to your ingress controller/gateway API's CIDR in production
  trustedProxies: "*"
  cacheDriver: redis
  queueConnection: redis
  sessionDriver: redis
  redisPort: "6379"
  filesystemDisk: debian_docker
  dbPort: "3306"
  # dbDatabase and dbUsername are shared by both the app and the MySQL container.
  # Change both env.dbDatabase/dbUsername and secret.dbPassword together.
  dbDatabase: ninja
  dbUsername: ninja
  dbConnection: mysql
  mailMailer: log
  mailHost: smtp.mailtrap.io
  mailPort: "2525"
  mailUsername: "null"
  mailPassword: "null"
  mailEncryption: "null"
  mailFromAddress: user@example.com
  mailFromName: Self Hosted User
  nordigenSecretId: ""
  nordigenSecretKey: ""
  isDocker: "true"
  scoutDriver: "null"

tolerations: []
affinity: {}
nodeSelector: {}
