name: Lint and Test Charts

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/ct-*.yaml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: helm/chart-testing-action@v2.8.0

      - name: Run ct lint
        run: ct lint --config .github/ct-lint.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  kubeconform:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        k8s: ["1.34.8", "1.36.1"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.8.0"
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate against Kubernetes ${{ matrix.k8s }}
        run: |
          helm dependency update charts/invoiceninja
          helm template charts/invoiceninja \
            --values charts/invoiceninja/ci/test-values.yaml \
            | kubeconform \
                -kubernetes-version ${{ matrix.k8s }} \
                -strict \
                -summary

  install:
    runs-on: ubuntu-latest
    needs: [lint, kubeconform]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: helm/kind-action@v1.14.0
        with:
          node_image: kindest/node:v1.36.1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: helm/chart-testing-action@v2.8.0

      - name: Run ct install
        run: ct install --config .github/ct-install.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
